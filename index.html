<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Pong</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: monospace;
      font-size: 48px;
      text-shadow: 2px 2px 4px #000;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="score">0 - 0</div>
  
  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    
    // Camera positioned behind the scene to see objects at z=0
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = -5;  // Move camera back to see the game board
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const BOARD_HEIGHT = 25;
    const PADDLE_WIDTH = 4;
    const PADDLE_HEIGHT = 1;
    const BALL_SIZE = 0.5;

    // Materials
    const boardMaterial = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const paddleMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
    const ballMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });

    // Create game board
    const board = new THREE.Mesh(
      new THREE.PlaneGeometry(BOARD_WIDTH, BOARD_HEIGHT),
      boardMaterial
    );
    board.rotation.x = Math.PI / 2;
    scene.add(board);

    // Draw center line
    const centerLine = new THREE.Mesh(
      new THREE.PlaneGeometry(1, BOARD_HEIGHT - 1),
      new THREE.MeshBasicMaterial({ color: 0x888888 })
    );
    centerLine.rotation.x = Math.PI / 2;
    centerLine.position.y = 10.5;
    scene.add(centerLine);

    // Create paddles
    const playerPaddle = new THREE.Mesh(
      new THREE.BoxGeometry(PADDLE_WIDTH, PADDLE_HEIGHT, 0.5),
      paddleMaterial
    );
    playerPaddle.position.set(-6, BOARD_HEIGHT / 2 - 0.5, 0);
    scene.add(playerPaddle);

    const aiPaddle = new THREE.Mesh(
      new THREE.BoxGeometry(PADDLE_WIDTH, PADDLE_HEIGHT, 0.5),
      new THREE.MeshPhongMaterial({ color: 0x00aaff })
    );
    aiPaddle.position.set(6, BOARD_HEIGHT / 2 - 0.5, 0);
    scene.add(aiPaddle);

    // Create ball
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(BALL_SIZE, 16, 16),
      ballMaterial
    );
    ball.position.set(0, BOARD_HEIGHT / 2, 0);
    scene.add(ball);

    // Game state
    let score = { left: 0, right: 0 };
    let ballSpeed = 0.15;
    let playerScore = document.getElementById('score');

    // Player paddle movement (mouse control)
    document.addEventListener('mousemove', (e) => {
      const mouseY = e.clientY;
      const targetY = BOARD_HEIGHT / 2 - 0.5 - mouseY / window.innerHeight * BOARD_HEIGHT / 2;
      playerPaddle.position.y = targetY;
    });

    // Initialize ball velocity
    let ballVelocity = new THREE.Vector3(0, 0, 0);

    // Ball reset function
    function resetBall() {
      ball.position.set(0, BOARD_HEIGHT / 2, 0);
      ballSpeed = 0.15;
      // Randomize direction
      ballVelocity.set(
        Math.random() < 0.5 ? 0.1 : -0.1,
        (Math.random() * 0.2) - 0.1,
        0
      );
    }

    // Reset ball position with velocity
    function resetBallAtPosition(x, y) {
      ball.position.set(x, y, 0);
      ballVelocity.set(0.1, 0, 0);
    }

    // Update score display
    function updateScoreDisplay() {
      playerScore.textContent = `${score.left} - ${score.right}`;
    }

    // AI paddle movement
    function updateAI() {
      const targetY = ball.position.y - PADDLE_HEIGHT / 2;
      const aiSpeed = 0.08;
      const delta = targetY - aiPaddle.position.y;
      
      if (Math.abs(delta) > aiSpeed) {
        aiPaddle.position.y += Math.sign(delta) * aiSpeed;
      } else if (Math.abs(delta) < aiSpeed) {
        aiPaddle.position.y = targetY;
      }
    }

    // Collision detection
    function checkCollision(paddle) {
      const paddleHalfWidth = PADDLE_WIDTH / 2;
      const paddleTop = paddle.position.y + PADDLE_HEIGHT / 2;
      const paddleBottom = paddle.position.y - PADDLE_HEIGHT / 2;

      return ball.position.x > paddle.position.x - paddleHalfWidth - BALL_SIZE &&
             ball.position.x < paddle.position.x + paddleHalfWidth + BALL_SIZE &&
             ball.position.y > paddleBottom - BALL_SIZE &&
             ball.position.y < paddleTop + BALL_SIZE;
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Update AI
      updateAI();

      // Update ball position
      ball.position.x += ballVelocity.x;
      ball.position.y += ballVelocity.y;

      // Update ball speed slightly
      ballVelocity.multiplyScalar(1.002);

      // Ball hits paddles
      if (ball.position.y > BOARD_HEIGHT / 2 - 1.25) {
        // Top edge - player paddle
        if (checkCollision(playerPaddle)) {
          ballVelocity.x = ballVelocity.x * 0.95;
          ballVelocity.y = -ballVelocity.y * 0.95;
          ball.position.x += ballVelocity.x * 0.5;
        } else {
          // Ball hit top edge
          ball.position.y = BOARD_HEIGHT / 2 - 1.25;
          ballVelocity.y = -Math.abs(ballVelocity.y) * 0.8;
        }
      }

      if (ball.position.y < -BOARD_HEIGHT / 2 + 1.25) {
        // Bottom edge - AI paddle
        if (checkCollision(aiPaddle)) {
          ballVelocity.x = ballVelocity.x * 0.95;
          ballVelocity.y = -ballVelocity.y * 0.95;
          ball.position.x -= ballVelocity.x * 0.5;
        } else {
          // Ball hit bottom edge
          ball.position.y = -BOARD_HEIGHT / 2 + 1.25;
          ballVelocity.y = Math.abs(ballVelocity.y) * 0.8;
        }
      }

      // Ball goes out of bounds
      if (ball.position.x > BOARD_WIDTH / 2 + 1) {
        score.left++;
        updateScoreDisplay();
        resetBallAtPosition(-BALL_SIZE, BOARD_HEIGHT / 2);
      } else if (ball.position.x < -BOARD_WIDTH / 2 - 1) {
        score.right++;
        updateScoreDisplay();
        resetBallAtPosition(BALL_SIZE, BOARD_HEIGHT / 2);
      }

      renderer.render(scene, camera);
    }

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start animation
    animate();
  </script>
</body>
</html>
