<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gliter Pong - Disco Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }
    
    #gameCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    #game-over {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px #fff;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px 40px;
      border-radius: 10px;
      z-index: 1000;
      text-align: center;
    }
    
    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 16px;
      text-shadow: 0 0 10px #0ff;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 8px;
      z-index: 1000;
    }
    
    #title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 20px #f0f;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 8px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <div id="title">🎮 GLITER PONG 🎮</div>
  
  <div id="instructions">Use ← ↑ → ↓ keys to move. First to 7 wins!</div>
  
  <div id="game-over"></div>
  
  <!-- Load Three.js from CDN -->
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { initGame } from './src/main.js';
    
    // Wait for DOM to load
    window.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('gameCanvas');
      
      // Initialize game
      try {
        const game = initGame(canvas);
        game.start();
      } catch (error) {
        console.error('Failed to initialize game:', error);
        const gameOverDiv = document.getElementById('game-over');
        gameOverDiv.textContent = 'ERROR: Could not load game\n\nClick here to try again';
        gameOverDiv.style.display = 'block';
        
        gameOverDiv.addEventListener('click', () => {
          gameOverDiv.style.display = 'none';
          try {
            const game = initGame(canvas);
            game.start();
          } catch (e) {
            console.error('Retry failed:', e);
          }
        });
      }
    });
  </script>
</body>
</html>
